version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - cqrs_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cqrs_read
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cqrs_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cqrs_read"]
      interval: 10s
      timeout: 5s
      retries: 5

  command-service:
    build: ./command-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MONGO_URL: mongodb://mongo:27017/cqrs_write
      POSTGRES_URL: postgresql://user:pass@postgres:5432/cqrs_read
      SYNC_INTERVAL_MS: 15000
      COMMAND_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cqrs_net

  query-service:
    build: ./query-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      POSTGRES_URL: postgresql://user:pass@postgres:5432/cqrs_read
      QUERY_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cqrs_net

volumes:
  mongo_data:
  postgres_data:

networks:
  cqrs_net:
    driver: bridge
